<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vela — warp the web</title>
    <meta name="description" content="Vela · a sleek space-themed web proxy powered by Ultraviolet." />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/style.css" />

    <!-- Ultraviolet core + config (needed on the page to encode destination URLs) -->
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <!-- Scramjet loader (exposes $scramjetLoadController for the alternate engine) -->
    <script src="scram/scramjet.all.js" defer></script>
</head>
<body>
    <canvas id="starfield" aria-hidden="true"></canvas>

    <div class="aurora" aria-hidden="true"></div>

    <main class="stage">
        <header class="brand">
            <div class="logo" aria-hidden="true">
                <svg viewBox="0 0 64 64" width="56" height="56">
                    <defs>
                        <radialGradient id="core" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#e6f0ff" />
                            <stop offset="45%" stop-color="#7aa2ff" />
                            <stop offset="100%" stop-color="#3a1d8a" />
                        </radialGradient>
                    </defs>
                    <circle cx="32" cy="32" r="13" fill="url(#core)" />
                    <ellipse cx="32" cy="32" rx="29" ry="10" fill="none"
                        stroke="#8b7bff" stroke-width="1.6" opacity="0.8"
                        transform="rotate(-24 32 32)" />
                    <ellipse cx="32" cy="32" rx="26" ry="7" fill="none"
                        stroke="#4de0ff" stroke-width="1.2" opacity="0.6"
                        transform="rotate(18 32 32)" />
                </svg>
            </div>
            <h1 class="wordmark">VELA</h1>
            <p class="tagline">Slip past the horizon. Browse the open web.</p>
        </header>

        <form id="search-form" class="console" autocomplete="off">
            <div class="input-shell">
                <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2" />
                    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                <input
                    id="search-field"
                    type="text"
                    name="q"
                    placeholder="Search the galaxy or enter a URL…"
                    aria-label="Search or enter address"
                    spellcheck="false"
                    autofocus
                />
                <button type="submit" class="warp-btn">
                    <span>Warp</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path d="M4 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
            <div class="engine-row">
                <div class="engine-toggle" role="group" aria-label="Proxy engine">
                    <button type="button" class="engine-btn active" data-engine="uv" aria-pressed="true">
                        Ultraviolet
                    </button>
                    <button type="button" class="engine-btn" data-engine="scramjet" aria-pressed="false">
                        Scramjet
                    </button>
                </div>
                <span class="engine-hint">Site broken or a game? Try Scramjet.</span>
            </div>
            <p id="status" class="status" role="status" data-kind="loading">Igniting thrusters…</p>
        </form>

        <nav class="chips" aria-label="Quick launch">
            <button type="button" class="chip" data-launch="https://www.google.com">Google</button>
            <button type="button" class="chip" data-launch="https://www.youtube.com">YouTube</button>
            <button type="button" class="chip" data-launch="https://www.reddit.com">Reddit</button>
            <button type="button" class="chip" data-launch="https://discord.com">Discord</button>
            <button type="button" class="chip" data-launch="https://www.wikipedia.org">Wikipedia</button>
        </nav>
    </main>

    <footer class="footer">
        <span>Vela · powered by <a href="https://github.com/titaniumnetwork-dev/Ultraviolet" target="_blank" rel="noopener">Ultraviolet</a></span>
    </footer>

    <script src="assets/starfield.js" defer></script>
    <script type="module" src="assets/app.js"></script>
</body>
</html>
